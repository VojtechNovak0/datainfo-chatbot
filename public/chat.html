<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>AI Chatbot</title>

  <style>

    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial;
      height:100vh;

      display:flex;
      flex-direction:column;
    }

    .header{
      padding:20px;
      background:#111827;
      font-size:24px;
      font-weight:bold;
    }

    #messages{
      flex:1;
      overflow-y:auto;
      padding:20px;
    }

    .msg{
      padding:12px 16px;
      border-radius:16px;
      margin-bottom:12px;
      width:fit-content;
      max-width:70%;
      word-wrap:break-word;
      white-space:pre-wrap;
      line-height:1.5;
    }

    .user{
       background:#2563eb;
       margin-left:auto;
    }

    .bot{
       background:#1e293b;
    }

    .input-area{
      display:flex;
      padding:20px;
      background:#111827;
      gap:10px;
    }

    input{
      flex:1;
      padding:14px;
      border:none;
      border-radius:10px;
      font-size:16px;
    }

    button{
      padding:14px 20px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#2563eb;
      color:white;
      font-weight:bold;
    }

  </style>
</head>
<body>

  <div class="header">
    Datainfo AI Chatbot
  </div>

  <div id="messages"></div>

  <div class="input-area">
    <input
      id="input"
      placeholder="Napište dotaz..."
    >

    <button onclick="sendMessage()">
      Odeslat
    </button>
  </div>

  <script>

  const input = document.getElementById("input");

  const messages = document.getElementById("messages");

  function scrollToBottom() {
     messages.scrollTop = messages.scrollHeight;
  }

  input.addEventListener("keydown", function(event){

    if(event.key === "Enter"){
      sendMessage();
    }

  });
  
  async function sendMessage(){

    const text = input.value;

    if(!text.trim()) return;

    addMessage(text, "user");

    input.value = "";
    input.focus();

    const res = await fetch("/api/chat",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:text
      })
    });

    const data = await res.json();

    addMessage(data.answer, "bot");
    scrollToBottom();
  }

  function addMessage(text,type){
     const div = document.createElement("div");
     div.className = `msg ${type}`;
     div.innerText = text;
     messages.appendChild(div);
     scrollToBottom();
  }

</script>

</body>
</html>
